[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
via_ir = false
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Skip OZ internal test/fv/scripts that have unresolvable imports
skip = ["lib/openzeppelin-contracts/test/**", "lib/openzeppelin-contracts/fv/**", "lib/openzeppelin-contracts/scripts/**"]

[lint]
exclude_lints = [
    "screaming-snake-case-immutable",
    "unused-import",
    "erc20-unchecked-transfer",
    "unsafe-typecast",
]

