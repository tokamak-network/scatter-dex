[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
via_ir = false
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Exclude OZ internal test/fv files from compilation
exclude_paths = ["lib/openzeppelin-contracts/test", "lib/openzeppelin-contracts/fv", "lib/openzeppelin-contracts/scripts"]
