[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
via_ir = false
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "poseidon-solidity/=lib/poseidon-solidity/contracts/",
]

# Skip OZ internal test/fv/scripts that have unresolvable imports.
# BatchAuthorizeVerifier requires via_ir — build separately with FOUNDRY_PROFILE=batch-verifier.
skip = ["lib/openzeppelin-contracts/test/**", "lib/openzeppelin-contracts/fv/**", "lib/openzeppelin-contracts/scripts/**", "src/zk/BatchAuthorizeVerifier.sol"]

# Profile for BatchAuthorizeVerifier which requires via_ir due to deep Yul nesting.
# Build: FOUNDRY_PROFILE=batch-verifier forge build
# Test:  FOUNDRY_PROFILE=batch-verifier forge test --match-contract BatchAuthorize
[profile.batch-verifier]
via_ir = true
optimizer = true
optimizer_runs = 200
skip = ["lib/openzeppelin-contracts/test/**", "lib/openzeppelin-contracts/fv/**", "lib/openzeppelin-contracts/scripts/**"]

[lint]
exclude_lints = [
    "screaming-snake-case-immutable",
    "erc20-unchecked-transfer",
    "unsafe-typecast",
]

