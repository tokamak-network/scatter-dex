[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
via_ir = false
optimizer = true
optimizer_runs = 200
# Allow deploy scripts to write the per-network address ledger
# (deployments/<chainId>.json) via vm.writeJson.
fs_permissions = [
    { access = "read-write", path = "./deployments" },
    { access = "read", path = "./test/fixtures" },
]
# Emit storageLayout so `forge inspect <contract> storage` (used by
# script/storage-layout/{check,snapshot}.sh) works without a separate
# `--extra-output` build pass.
extra_output = ["storageLayout"]

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "poseidon-solidity/=lib/poseidon-solidity/contracts/",
]

# Skip OZ internal test/fv/scripts that have unresolvable imports.
# BatchAuthorizeVerifier requires via_ir — build separately with FOUNDRY_PROFILE=batch-verifier.
skip = [
    "lib/openzeppelin-contracts/test/**",
    "lib/openzeppelin-contracts/fv/**",
    "lib/openzeppelin-contracts/scripts/**",
    "lib/openzeppelin-contracts-upgradeable/test/**",
    "lib/openzeppelin-contracts-upgradeable/certora/**",
    "lib/openzeppelin-contracts-upgradeable/scripts/**",
    # All tiers of the hand-written batch verifier need via-ir (deep Yul) —
    # glob covers BatchAuthorizeVerifier{,_64,_128,…}.sol as tiers are added.
    "src/zk/BatchAuthorizeVerifier*.sol",
    # Real-proof batch test imports the via-ir verifiers above — only the
    # batch-verifier profile can compile it. Skip it in the default profile.
    "test/BatchAuthorizeVerifier.t.sol",
    # WireBatchVerifiers imports the via-ir batch verifiers directly; run it
    # under FOUNDRY_PROFILE=batch-verifier. (DeploySepolia deploys them by
    # artifact via vm.getCode, so it does NOT import them and stays default.)
    "script/WireBatchVerifiers.s.sol",
]

# Fuzz / invariant defaults for PR builds — fast enough to keep PR CI snappy
# while still exercising every state-mutating function under random input.
[fuzz]
runs = 256

[invariant]
runs = 256
depth = 500
fail_on_revert = false

# Profile for deeper hardening runs (nightly CI, pre-audit). 10x fuzz, 4x
# invariant runs, 4x depth — bumps stress on the same suites without
# requiring different test code.
[profile.deep.fuzz]
runs = 10000

[profile.deep.invariant]
runs = 1024
depth = 2000
fail_on_revert = false

# Profile for BatchAuthorizeVerifier which requires via_ir due to deep Yul nesting.
# Build: FOUNDRY_PROFILE=batch-verifier forge build
# Test:  FOUNDRY_PROFILE=batch-verifier forge test --match-contract BatchAuthorize
[profile.batch-verifier]
via_ir = true
optimizer = true
optimizer_runs = 200
skip = ["lib/openzeppelin-contracts/test/**", "lib/openzeppelin-contracts/fv/**", "lib/openzeppelin-contracts/scripts/**"]

[lint]
exclude_lints = [
    "screaming-snake-case-immutable",
    "erc20-unchecked-transfer",
    "unsafe-typecast",
]

# Named RPC endpoints resolved from contracts/.env (forge auto-loads it), so
# the URL never appears on the command line. Use: `forge script ... --rpc-url sepolia`.
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

# Etherscan key for `forge ... --verify` (and `forge verify-contract`).
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }

