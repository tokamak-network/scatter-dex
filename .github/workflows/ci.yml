name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger for the fork-integration job (and any future
  # opt-in steps gated on workflow_dispatch).
  workflow_dispatch:

concurrency:
  # Cancel only PR runs on rapid pushes — keep main runs intact so the
  # green-on-tip signal isn't lost mid-flight (matters once deploy gates
  # consume it).
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────────────────────────────────────────────────────────
  #  Contracts — Foundry build + non-fork test suite
  # ────────────────────────────────────────────────────────────────
  contracts:
    name: contracts / forge test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.0.0

      - name: Cache forge build artifacts
        uses: actions/cache@v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**', 'contracts/lib/**') }}
          restore-keys: forge-${{ runner.os }}-

      - name: forge fmt --check
        # Warn-only — many existing files predate fmt standardisation.
        run: forge fmt --check
        continue-on-error: true

      - name: forge test (non-fork)
        # `forge test` compiles transitively, so a separate `forge build`
        # step would just double the work. Skipping it.
        run: forge test --no-match-contract Fork -vvv

      - name: forge snapshot (gas diff)
        # Doubles the contracts-job wall time and isn't gating anything;
        # opt-in via the manual workflow_dispatch trigger.
        if: github.event_name == 'workflow_dispatch'
        run: forge snapshot --no-match-contract Fork
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  #  Frontend — typecheck + lint + production build
  # ────────────────────────────────────────────────────────────────
  frontend:
    name: frontend / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # `frontend` links `@zkscatter/sdk` via a `file:../packages/sdk`
      # workspace dep. `npm ci` in `frontend/` doesn't install the
      # SDK's own transitive deps (ethers, @noble/*, snarkjs, ...),
      # which Next then can't resolve when it walks up from
      # `packages/sdk/src/...`. Install them explicitly.
      - name: Install linked SDK deps
        working-directory: packages/sdk
        run: npm ci

      - name: ESLint
        # All errors fixed; warnings still tolerated (mostly unused-vars
        # and exhaustive-deps that need case-by-case review).
        run: npm run lint

      - name: Next.js build
        # Build validates types + compiles the full bundle, catching the
        # "compiles in dev mode but fails in prod" class of bugs (stale
        # imports, missing ABI entries, unresolved env vars).
        run: npm run build
        env:
          # Non-zero placeholders so build-time checks pass without real
          # addresses — all actual env is injected at runtime via .env.local.
          NEXT_PUBLIC_RPC_URL: http://localhost:8545
          NEXT_PUBLIC_CHAIN_ID: "31337"
          NEXT_PUBLIC_ZK_RELAYER_URL: http://localhost:3002

  # ────────────────────────────────────────────────────────────────
  #  Relayer — vitest suite
  # ────────────────────────────────────────────────────────────────
  relayer:
    name: relayer / vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zk-relayer
    steps:
      - uses: actions/checkout@v4

      # No npm cache here — the npm CLI bug #4828 prunes platform-
      # specific optional binaries (rollup-linux-x64-gnu, swc, etc.) when
      # restoring from any cached state, including the npm registry cache
      # itself. A clean wipe + install is the only reliable workaround
      # until the upstream fix lands.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install (workaround for npm CLI bug #4828)
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: tsc --noEmit
        # Pre-existing type errors in routes/p2p.ts predate CI wiring;
        # warn-only until the cleanup PR. vitest below covers runtime
        # correctness independently (esbuild's loose typing).
        run: npx tsc --noEmit
        continue-on-error: true

      - name: vitest
        run: npm test

  # ────────────────────────────────────────────────────────────────
  #  E2E — authorize cross-relayer flow (manual trigger only)
  #
  #  Spins up anvil + DeployLocal + shared-orderbook + Relayer A/B and
  #  runs zk-relayer/test/e2e-authorize-cross-relayer.ts end-to-end.
  #  Catches FSM regressions like #391 (status-filter skipping accepted
  #  orders) that vitest unit tests can't see — they only manifest when
  #  two relayers actually negotiate via the shared orderbook.
  #
  #  Manual-only because the circuit build (PTAU + zkey for 5 circuits)
  #  is heavy (~5–8 min cold, ~1–2 min cached). Run via the Actions tab
  #  before merging anything that touches the matcher / Trade Offer
  #  paths or the relayer-↔-orderbook contract.
  # ────────────────────────────────────────────────────────────────
  e2e-authorize-cross-relayer:
    name: e2e / authorize cross-relayer
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install circom (prebuilt, SHA256-pinned)
        # Install into a user-writable dir so we don't need sudo for
        # /usr/local/bin (root-owned on GH-hosted runners). SHA256 pin
        # gates supply-chain tampering on the GitHub release asset.
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -fsSL -o "$HOME/.local/bin/circom" \
            https://github.com/iden3/circom/releases/download/v2.1.9/circom-linux-amd64
          echo "e5575829252d763b7818049df9de2ef9304df834697de77fa63ce7babc23c967  $HOME/.local/bin/circom" \
            | sha256sum -c -
          chmod +x "$HOME/.local/bin/circom"
          "$HOME/.local/bin/circom" --version

      # Cache the heavy circuit artifacts (Powers of Tau + per-circuit
      # zkeys + Verifier.sol). Keyed by build.sh + every .circom — any
      # circuit change invalidates and forces a rebuild. Cold ~5 min,
      # warm <10s. Verifier.sol files land under circuits/build/ and
      # are copied into contracts/src/zk/ by build.sh; cache covers both
      # so a warm hit also restores them.
      - name: Cache circuits/build
        id: circuits-cache
        uses: actions/cache@v4
        with:
          path: |
            circuits/build
            contracts/src/zk/*Verifier.sol
          # Include package-lock so a snarkjs/circomlib bump invalidates
          # the cache — otherwise stale zkeys ship against a new toolchain.
          key: circuits-${{ runner.os }}-${{ hashFiles('circuits/scripts/build.sh', 'circuits/*.circom', 'circuits/package-lock.json') }}

      - name: npm install (circuits, shared-orderbook, zk-relayer)
        run: |
          (cd circuits && npm install --no-audit --no-fund)
          (cd shared-orderbook && npm install --no-audit --no-fund)
          # zk-relayer: same npm bug #4828 workaround as the relayer job.
          (cd zk-relayer && rm -rf node_modules package-lock.json && npm install --no-audit --no-fund)

      - name: Build circuits (if cache miss)
        if: steps.circuits-cache.outputs.cache-hit != 'true'
        run: (cd circuits && npm run build)

      # Cache forge build AFTER circuits have been restored/built.
      # Otherwise the contracts/src/zk/*Verifier.sol files (generated by
      # build.sh) would be present on warm runs but absent on cold ones,
      # which changes hashFiles('contracts/src/**') and silently halves
      # the forge cache hit rate.
      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            contracts/out
            contracts/cache
          key: forge-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**', 'contracts/lib/**') }}
          restore-keys: forge-${{ runner.os }}-

      - name: Bring up E2E env
        run: ./scripts/start-e2e-env.sh

      - name: Run e2e-authorize-cross-relayer
        # E2E_USDC_ADDRESS is exported into $GITHUB_ENV by start-e2e-env.sh
        # from the live DeployLocal output, so it stays correct even if
        # DeployLocal's deterministic address ordering ever shifts.
        run: (cd zk-relayer && npx tsx test/e2e-authorize-cross-relayer.ts)

      - name: Tear down E2E env
        if: always()
        run: ./scripts/stop-e2e-env.sh || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: .e2e-logs/
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────
  #  Fork integration — manual trigger only (needs MAINNET_RPC secret)
  # ────────────────────────────────────────────────────────────────
  fork-integration:
    name: contracts / fork tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.0.0
      - name: forge test --match-contract Fork
        env:
          MAINNET_RPC: ${{ secrets.MAINNET_RPC }}
        run: |
          if [ -z "$MAINNET_RPC" ]; then
            echo "MAINNET_RPC secret not configured — skipping fork tests"
            exit 0
          fi
          forge test --match-contract Fork --fork-url "$MAINNET_RPC" -vvv
