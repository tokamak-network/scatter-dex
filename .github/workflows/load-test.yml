name: Load test (R-14)

# Manual only. Don't gate PRs on perf — runner CPU varies too much
# for stable thresholds, and the throughput numbers we care about
# come from runs against the real deploy, not the CI host.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which k6 scenario to run"
        type: choice
        options:
          - orderbook-smoke
          - orderbook-orders
          - orderbook-leaderboard
          - orderbook-settlements
        default: orderbook-smoke
      profile:
        description: "Load profile (smoke / load / stress)"
        type: choice
        options: [smoke, load, stress]
        default: smoke
      target:
        description: "Target base URL (e.g. http://localhost:4000 inside the job, or a deployed URL)"
        type: string
        default: "http://localhost:4000"

permissions:
  contents: read

jobs:
  loadtest:
    name: k6 ${{ inputs.scenario }} @ ${{ inputs.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      orderbook:
        # Only spun up when target is the in-job default. For a
        # deployed URL the runner just hits the network — no service.
        image: node:20-slim
        # Service jobs need an image but we can't easily run our
        # built source in one without a Dockerfile + registry push.
        # For now this slot is reserved; default `target` points at
        # an externally-hosted instance for real runs.
        options: --health-cmd "echo healthy" --health-interval 1s

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Run k6 scenario
        working-directory: loadtest
        env:
          K6_TARGET: ${{ inputs.target }}
          K6_PROFILE: ${{ inputs.profile }}
        run: k6 run "k6/${{ inputs.scenario }}.js" --out json=results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-${{ inputs.scenario }}-${{ inputs.profile }}-${{ github.run_id }}
          path: loadtest/results.json
          retention-days: 14
