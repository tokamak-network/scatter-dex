# deploy/runtime/compose.yml
# Runtime composition for a single VM (e.g. GCP e2-micro).
# Pulls prebuilt images; no source code on the VM.
#
# Usage:
#   docker compose -f compose.yml --env-file .env up -d
#
# Add TLS with the overlay (after a domain is pointed at this host):
#   docker compose -f compose.yml -f compose.tls.yml --env-file .env up -d

services:
  shared-orderbook:
    image: ${SHARED_ORDERBOOK_IMAGE}:${IMAGE_TAG:-latest}
    container_name: shared-orderbook
    restart: unless-stopped
    environment:
      - PORT=4000
      - DB_PATH=${SHARED_ORDERBOOK_DB_PATH:-/data/shared-orderbook.db}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # SIWE admin allowlist (comma-separated wallet addresses). Enables the
      # wallet-signature login the admin app's KYC review uses. Empty → the
      # SIWE challenge/session routes stay unmounted (404) and the other
      # admin-gated routes return 503, so the KYC surface is unusable until
      # set. Public addresses; the VM startup injects the value from instance
      # metadata, never from git.
      - ADMIN_ADDRESSES=${ADMIN_ADDRESSES:-}
      # Optional static bearer for CI / verify-stats (legacy path). Empty when
      # only SIWE is used. Injected from Secret Manager by the VM startup.
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    volumes:
      - orderbook-data:/data
    ports:
      - "${SHARED_ORDERBOOK_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Settlement verifier — same image as shared-orderbook, different
  # entrypoint. Reads RPC, matches `PrivateSettledAuth` events against
  # relayer-pushed rows in the shared DB, flips `verified=1`. Shares
  # the `orderbook-data` volume because the DB is the rendezvous.
  # Optional: omit by removing this service if no RPC is configured.
  settlement-verifier:
    image: ${SHARED_ORDERBOOK_IMAGE}:${IMAGE_TAG:-latest}
    container_name: settlement-verifier
    restart: unless-stopped
    depends_on:
      shared-orderbook:
        condition: service_healthy
    environment:
      - DB_PATH=${SHARED_ORDERBOOK_DB_PATH:-/data/shared-orderbook.db}
      - RPC_URL=${RPC_URL}
      - PRIVATE_SETTLEMENT_ADDRESS=${PRIVATE_SETTLEMENT_ADDRESS}
      - VERIFIER_POLL_INTERVAL_SEC=${VERIFIER_POLL_INTERVAL_SEC:-30}
      - VERIFIER_BLOCK_SAFETY_MARGIN=${VERIFIER_BLOCK_SAFETY_MARGIN:-6}
      - VERIFIER_LIMIT_PER_PASS=${VERIFIER_LIMIT_PER_PASS:-500}
    volumes:
      - orderbook-data:/data
    command: ["node", "dist/verify.js", "--watch"]

  # Commitment indexer — same image as shared-orderbook, different entrypoint.
  # Scans CommitmentInserted events from the deploy block and writes the leaves
  # to the shared DB so GET /api/commitments can serve them (clients hydrate the
  # Merkle tree without each scanning eth_getLogs). Shares orderbook-data
  # because the DB is the rendezvous. Optional: omit if no RPC is configured.
  commitment-indexer:
    image: ${SHARED_ORDERBOOK_IMAGE}:${IMAGE_TAG:-latest}
    container_name: commitment-indexer
    restart: unless-stopped
    depends_on:
      shared-orderbook:
        condition: service_healthy
    environment:
      - DB_PATH=${SHARED_ORDERBOOK_DB_PATH:-/data/shared-orderbook.db}
      - RPC_URL=${RPC_URL}
      - COMMITMENT_POOL_ADDRESS=${COMMITMENT_POOL_ADDRESS}
      - COMMITMENT_DEPLOY_BLOCK=${COMMITMENT_DEPLOY_BLOCK:-0}
      - COMMITMENT_POLL_INTERVAL_SEC=${COMMITMENT_POLL_INTERVAL_SEC:-30}
      - COMMITMENT_BLOCK_SAFETY_MARGIN=${COMMITMENT_BLOCK_SAFETY_MARGIN:-6}
      - COMMITMENT_INDEX_BLOCK_RANGE=${COMMITMENT_INDEX_BLOCK_RANGE:-50000}
    volumes:
      - orderbook-data:/data
    command: ["node", "dist/commitment-indexer.js", "--watch"]

  # zk-relayer is run per-operator (each relayer operator hosts their own),
  # NOT on the central orderbook box. Behind the "relayer" compose profile so
  # the default `up` (orderbook + settlement-verifier) does not start it.
  # An operator who wants it co-located runs `docker compose --profile relayer up`.
  zk-relayer:
    profiles: ["relayer"]
    image: ${ZK_RELAYER_IMAGE}:${IMAGE_TAG:-latest}
    container_name: zk-relayer
    restart: unless-stopped
    depends_on:
      shared-orderbook:
        condition: service_healthy
    environment:
      - PORT=3002
      - DB_PATH=/data/zk-relayer.db
      - RPC_URL=${RPC_URL}
      - COMMITMENT_POOL_ADDRESS=${COMMITMENT_POOL_ADDRESS}
      - PRIVATE_SETTLEMENT_ADDRESS=${PRIVATE_SETTLEMENT_ADDRESS}
      - RELAYER_FEE=${RELAYER_FEE:-30}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SHARED_ORDERBOOK_URL=http://shared-orderbook:4000
      - RELAYER_PRIVATE_KEY_FILE=/run/secrets/relayer_key
    secrets:
      - relayer_key
    volumes:
      - zk-relayer-data:/data
      - ${CIRCUITS_BUILD_DIR:-/opt/zkscatter/circuits/build}:/app/circuits/build:ro
    ports:
      - "${ZK_RELAYER_PORT:-3002}:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

secrets:
  relayer_key:
    file: ${RELAYER_KEY_FILE:-/opt/zkscatter/secrets/relayer.key}

volumes:
  orderbook-data:
  zk-relayer-data:
