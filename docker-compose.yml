version: "3.8"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - ./contracts:/contracts
    working_dir: /contracts
    entrypoint: ["forge", "script", "script/DeployLocal.s.sol:DeployLocal",
      "--rpc-url", "http://anvil:8545",
      "--broadcast", "--private-key", "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"]

  relayer:
    build:
      context: ./relayer
      dockerfile: Dockerfile
    depends_on:
      deployer:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    environment:
      - RPC_URL=http://anvil:8545
      - RELAYER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - SETTLEMENT_ADDRESS=${SETTLEMENT_ADDRESS:-0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9}
      - RELAYER_FEE=30
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/info"]
      interval: 3s
      timeout: 5s
      retries: 10
