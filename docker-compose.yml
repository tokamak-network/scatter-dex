services:
  # ── Anvil (mock mode only) ──────────────────────────────────
  # Integration mode skips this — uses zk-X509's anvil instead.
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    profiles: ["mock"]
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ── Contract deployer ───────────────────────────────────────
  deployer:
    image: ghcr.io/foundry-rs/foundry:stable
    user: root
    volumes:
      - ./contracts:/contracts
      - ./scripts/deploy-docker.sh:/deploy.sh
      - shared:/shared
    entrypoint: ["bash", "/deploy.sh"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      # WARNING: Default is Anvil Account #0 (well-known deployer key). Override DEPLOYER_KEY for production.
      - DEPLOYER_KEY=${DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - IDENTITY_REGISTRY=${IDENTITY_REGISTRY:-}
      - RELAYER_IDENTITY_REGISTRY=${RELAYER_IDENTITY_REGISTRY:-}

  # ── Shared Orderbook Server ─────────────────────────────────
  shared-orderbook:
    build: ./shared-orderbook
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_PATH=/data/shared-orderbook.db
    volumes:
      - orderbook-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 10

  # ── ZK Relayer A (primary) ──────────────────────────────────
  zk-relayer:
    build: ./zk-relayer
    depends_on:
      deployer:
        condition: service_completed_successfully
      shared-orderbook:
        condition: service_healthy
    ports:
      - "3002:3002"
    volumes:
      - shared:/shared:ro
      - relayer-a-data:/data
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && exec npx tsx src/index.ts"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      # WARNING: Default is Anvil Account #1 (well-known test key). Override RELAYER_A_KEY for production.
      - RELAYER_PRIVATE_KEY=${RELAYER_A_KEY:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}
      - RELAYER_FEE=30
      - PORT=3002
      - DB_PATH=/data/zk-relayer.db
      - SHARED_ORDERBOOK_URL=http://shared-orderbook:4000
      - RELAYER_PUBLIC_URL=${RELAYER_A_PUBLIC_URL:-http://zk-relayer:3002}
      - RELAYER_NAME=Relayer-A
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/info',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 15

  # ── ZK Relayer B (cross-relayer matching) ───────────────────
  zk-relayer-b:
    build: ./zk-relayer
    profiles: ["multi-relayer"]
    depends_on:
      deployer:
        condition: service_completed_successfully
      shared-orderbook:
        condition: service_healthy
    ports:
      - "3003:3003"
    volumes:
      - shared:/shared:ro
      - relayer-b-data:/data
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && exec npx tsx src/index.ts"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      # WARNING: Default is Anvil Account #2 (well-known test key). Override RELAYER_B_KEY for production.
      - RELAYER_PRIVATE_KEY=${RELAYER_B_KEY:-0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a}
      - RELAYER_FEE=30
      - PORT=3003
      - DB_PATH=/data/zk-relayer-b.db
      - SHARED_ORDERBOOK_URL=http://shared-orderbook:4000
      - RELAYER_PUBLIC_URL=${RELAYER_B_PUBLIC_URL:-http://zk-relayer-b:3003}
      - RELAYER_NAME=Relayer-B
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/api/info',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 15

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    depends_on:
      zk-relayer:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - shared:/shared:ro
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && export NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-http://localhost:8545} && exec npx next dev"]
    environment:
      - NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-http://localhost:8545}

volumes:
  shared:
  orderbook-data:
  relayer-a-data:
  relayer-b-data:
