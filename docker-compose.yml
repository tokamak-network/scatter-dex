services:
  # ── Anvil (mock mode only) ──────────────────────────────────
  # Integration mode skips this — uses zk-X509's anvil instead.
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    profiles: ["mock"]
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ── Contract deployer ───────────────────────────────────────
  deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    user: root
    volumes:
      - ./contracts:/contracts
      - ./scripts/deploy-docker.sh:/deploy.sh
      - shared:/shared
    entrypoint: ["bash", "/deploy.sh"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      - IDENTITY_REGISTRY=${IDENTITY_REGISTRY:-}
      - RELAYER_IDENTITY_REGISTRY=${RELAYER_IDENTITY_REGISTRY:-}

  # ── Relayer ─────────────────────────────────────────────────
  relayer:
    build: ./relayer
    depends_on:
      deployer:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    volumes:
      - shared:/shared:ro
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && exec npx tsx src/index.ts"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      - RELAYER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - RELAYER_FEE=30
      - PORT=3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/api/info', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 3s
      timeout: 5s
      retries: 15

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    depends_on:
      relayer:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - shared:/shared:ro
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && exec npm run dev"]
    environment:
      - NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-http://localhost:8545}

volumes:
  shared:
