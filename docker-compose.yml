services:
  # ── Anvil (mock mode only) ──────────────────────────────────
  # Integration mode skips this — uses zk-X509's anvil instead.
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    profiles: ["mock"]
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ── Contract deployer ───────────────────────────────────────
  deployer:
    image: ghcr.io/foundry-rs/foundry:stable
    user: root
    volumes:
      - ./contracts:/contracts
      - ./scripts/deploy-docker.sh:/deploy.sh
      - shared:/shared
    entrypoint: ["bash", "/deploy.sh"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      - IDENTITY_REGISTRY=${IDENTITY_REGISTRY:-}
      - RELAYER_IDENTITY_REGISTRY=${RELAYER_IDENTITY_REGISTRY:-}

  # ── ZK Relayer (private settlement + gasless claims) ────────
  zk-relayer:
    build: ./zk-relayer
    depends_on:
      deployer:
        condition: service_completed_successfully
    ports:
      - "3002:3002"
    volumes:
      - shared:/shared:ro
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && exec npx tsx src/index.ts"]
    environment:
      - RPC_URL=${RPC_URL:-http://anvil:8545}
      - RELAYER_PRIVATE_KEY=0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d
      - RELAYER_FEE=30
      - PORT=3002
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/info',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 15

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    depends_on:
      zk-relayer:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - shared:/shared:ro
    entrypoint: ["sh", "-c", "set -a && . /shared/addresses.env && set +a && export NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-http://localhost:8545} && exec npx next dev"]
    environment:
      - NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-http://localhost:8545}

volumes:
  shared:
